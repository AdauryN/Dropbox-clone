<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Storage</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ── Login Screen ── -->
    <div id="login-section">
        <h1>Cloud Storage</h1>
        <button id="login-btn">Sign in with Google</button>
    </div>

    <!-- ── App (shown after login) ── -->
    <div id="app-section" hidden>
        <header>
            <h2>Cloud Storage</h2>
            <div class="user-info">
                <span id="user-email"></span>
                <button id="logout-btn">Logout</button>
            </div>
        </header>

        <main>
            <div id="message" class="message" hidden></div>

            <div class="path-bar">
                <strong>Location:</strong> <span id="current-path">/</span>
            </div>

            <div class="action-forms">
                <div class="create-form">
                    <input type="text" id="new-dir-name" placeholder="New directory name" maxlength="100">
                    <button id="create-btn">Create Directory</button>
                </div>
                <div class="upload-form">
                    <input type="file" id="file-input">
                    <button id="upload-btn">Upload File</button>
                </div>
            </div>

            <div id="contents-list" class="dir-list"></div>

            <div id="shared-section" hidden>
                <h3 class="shared-heading">Shared with me</h3>
                <div id="shared-list" class="dir-list"></div>
            </div>

            <div id="duplicates-section" hidden>
                <h3 class="shared-heading">Duplicate files</h3>
                <div id="duplicates-list"></div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs (compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="/static/firebase-login.js"></script>

    <script>
    // ── State ──────────────────────────────────────────────────────────────
    let currentUser = null;
    let currentPath = '/';

    // ── DOM refs ───────────────────────────────────────────────────────────
    const loginSection  = document.getElementById('login-section');
    const appSection    = document.getElementById('app-section');
    const userEmailEl   = document.getElementById('user-email');
    const currentPathEl = document.getElementById('current-path');
    const contentsEl    = document.getElementById('contents-list');
    const msgEl         = document.getElementById('message');
    const newDirInput   = document.getElementById('new-dir-name');

    // ── Auth ───────────────────────────────────────────────────────────────
    firebase.auth().onAuthStateChanged(async user => {
        if (user) {
            currentUser = user;
            userEmailEl.textContent = user.email;
            loginSection.hidden = true;
            appSection.hidden = false;
            await notifyBackendLogin();
            loadContent();
            loadSharedFiles();
            loadDuplicates();
        } else {
            currentUser = null;
            loginSection.hidden = false;
            appSection.hidden = true;
        }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        firebase.auth()
            .signInWithPopup(new firebase.auth.GoogleAuthProvider())
            .catch(err => showMsg(err.message, 'error'));
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        firebase.auth().signOut();
    });

    // ── API helper (JSON requests) ─────────────────────────────────────────
    async function apiFetch(path, options = {}) {
        const token = await currentUser.getIdToken();
        const headers = { 'Authorization': `Bearer ${token}` };
        if (options.body) headers['Content-Type'] = 'application/json';
        const res = await fetch(path, { ...options, headers });
        const data = await res.json();
        return { ok: res.ok, status: res.status, data };
    }

    // ── Login notification ─────────────────────────────────────────────────
    async function notifyBackendLogin() {
        await apiFetch('/api/login', {
            method: 'POST',
            body: JSON.stringify({ email: currentUser.email }),
        });
    }

    // ── Navigation (Tasks 5, 6, 7) ─────────────────────────────────────────
    function navigateTo(path) {
        currentPath = path;
        loadContent();
    }

    function navigateUp() {
        if (currentPath === '/') return;
        const parts = currentPath.split('/').filter(p => p);
        parts.pop();
        currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
        loadContent();
    }

    // ── Load directories + files in parallel ──────────────────────────────
    async function loadContent() {
        currentPathEl.textContent = currentPath;
        const encoded = encodeURIComponent(currentPath);
        const [dirsRes, filesRes] = await Promise.all([
            apiFetch(`/api/directories?path=${encoded}`),
            apiFetch(`/api/files?path=${encoded}`),
        ]);
        if (!dirsRes.ok || !filesRes.ok) {
            showMsg('Failed to load contents', 'error');
            return;
        }
        renderContent(dirsRes.data, filesRes.data);
    }

    function renderContent(dirs, files) {
        contentsEl.innerHTML = '';

        // Task 6 & 7: show ../ only when not at root
        if (currentPath !== '/') {
            const row = document.createElement('div');
            row.className = 'dir-row clickable';

            const icon = document.createElement('span');
            icon.className = 'dir-icon';
            icon.textContent = '[DIR]';

            const name = document.createElement('span');
            name.className = 'dir-name';
            name.textContent = '../';

            row.appendChild(icon);
            row.appendChild(name);
            row.addEventListener('click', navigateUp);
            contentsEl.appendChild(row);
        }

        // Directories — name is clickable to navigate in (Task 5)
        dirs.forEach(dir => {
            const row = document.createElement('div');
            row.className = 'dir-row';

            const icon = document.createElement('span');
            icon.className = 'dir-icon';
            icon.textContent = '[DIR]';

            const name = document.createElement('span');
            name.className = 'dir-name clickable';
            name.textContent = dir.name;
            name.addEventListener('click', () => navigateTo(dir.path));

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = 'Delete';
            delBtn.addEventListener('click', () => deleteDirectory(dir.id, dir.name));

            row.appendChild(icon);
            row.appendChild(name);
            row.appendChild(delBtn);
            contentsEl.appendChild(row);
        });

        // Build hash frequency map for duplicate highlighting
        const hashCount = {};
        files.forEach(f => { if (f.hash) hashCount[f.hash] = (hashCount[f.hash] || 0) + 1; });

        // Files
        files.forEach(file => {
            const row = document.createElement('div');
            row.className = file.hash && hashCount[file.hash] > 1 ? 'dir-row duplicate' : 'dir-row';

            const icon = document.createElement('span');
            icon.className = 'dir-icon';
            icon.textContent = '[FILE]';

            const name = document.createElement('span');
            name.className = 'dir-name';
            name.textContent = file.name;

            const size = document.createElement('span');
            size.className = 'file-size';
            size.textContent = formatSize(file.size);

            const dlBtn = document.createElement('button');
            dlBtn.className = 'download-btn';
            dlBtn.textContent = 'Download';
            dlBtn.addEventListener('click', () => downloadFile(file.id, file.name));

            const shareBtn = document.createElement('button');
            shareBtn.className = 'share-btn';
            shareBtn.textContent = 'Share';
            shareBtn.addEventListener('click', () => shareFile(file.id, file.name));

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = 'Delete';
            delBtn.addEventListener('click', () => deleteFile(file.id, file.name));

            row.appendChild(icon);
            row.appendChild(name);
            row.appendChild(size);
            row.appendChild(dlBtn);
            row.appendChild(shareBtn);
            row.appendChild(delBtn);
            contentsEl.appendChild(row);
        });

        // Empty state
        if (dirs.length === 0 && files.length === 0) {
            const p = document.createElement('p');
            p.className = 'empty-msg';
            p.textContent = currentPath === '/' ? 'No files or directories yet.' : 'This directory is empty.';
            contentsEl.appendChild(p);
        }
    }

    // ── Create directory ───────────────────────────────────────────────────
    document.getElementById('create-btn').addEventListener('click', createDirectory);
    newDirInput.addEventListener('keydown', e => { if (e.key === 'Enter') createDirectory(); });

    async function createDirectory() {
        const name = newDirInput.value.trim();
        if (!name) { showMsg('Enter a directory name', 'error'); return; }

        const { ok, data } = await apiFetch('/api/directories', {
            method: 'POST',
            body: JSON.stringify({ name, parent_path: currentPath }),
        });

        if (ok) {
            newDirInput.value = '';
            showMsg(`Directory "${name}" created`, 'success');
            loadContent();
        } else {
            showMsg(data.error || 'Failed to create directory', 'error');
        }
    }

    // ── Delete directory ───────────────────────────────────────────────────
    async function deleteDirectory(dirId, dirName) {
        if (!confirm(`Delete directory "${dirName}"?\nThis cannot be undone.`)) return;

        const { ok, data } = await apiFetch(`/api/directories/${dirId}`, {
            method: 'DELETE',
        });

        if (ok) {
            showMsg(`Directory "${dirName}" deleted`, 'success');
            loadContent();
        } else {
            showMsg(data.error || 'Failed to delete directory', 'error');
        }
    }

    // ── Upload file (Task 8) ───────────────────────────────────────────────
    document.getElementById('upload-btn').addEventListener('click', () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) { showMsg('Select a file first', 'error'); return; }
        doUpload(file, false);
    });

    async function doUpload(file, overwrite, duplicateConfirmed = false) {
        const token = await currentUser.getIdToken();
        const formData = new FormData();
        formData.append('file', file);
        formData.append('directory_path', currentPath);
        if (overwrite) formData.append('overwrite', 'true');
        if (duplicateConfirmed) formData.append('duplicate_confirmed', 'true');

        // Do NOT set Content-Type manually — browser sets multipart boundary automatically
        const res = await fetch('/api/files', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData,
        });
        const data = await res.json();

        if (res.ok) {
            document.getElementById('file-input').value = '';
            showMsg(`"${file.name}" uploaded successfully`, 'success');
            loadContent();
            loadDuplicates();
        } else if (res.status === 409 && data.exists) {
            // Critical rule: confirm before overwriting
            if (confirm(`"${file.name}" already exists here. Overwrite it?`)) {
                doUpload(file, true, duplicateConfirmed);
            }
        } else if (res.status === 409 && data.duplicate) {
            const loc = data.existing_path === '/'
                ? `/${data.existing_name}`
                : `${data.existing_path}/${data.existing_name}`;
            if (confirm(`"${file.name}" is identical to an existing file at ${loc}.\nUpload anyway?`)) {
                doUpload(file, overwrite, true);
            }
        } else {
            showMsg(data.error || 'Upload failed', 'error');
        }
    }

    // ── Delete file ───────────────────────────────────────────────────────
    async function deleteFile(fileId, fileName) {
        if (!confirm(`Delete "${fileName}"?\nThis cannot be undone.`)) return;

        const { ok, data } = await apiFetch(`/api/files/${fileId}`, {
            method: 'DELETE',
        });

        if (ok) {
            showMsg(`"${fileName}" deleted`, 'success');
            loadContent();
            loadDuplicates();
        } else {
            showMsg(data.error || 'Failed to delete file', 'error');
        }
    }

    // ── Download file ──────────────────────────────────────────────────────
    async function downloadFile(fileId, fileName) {
        const token = await currentUser.getIdToken();
        const res = await fetch(`/api/files/${fileId}/download`, {
            headers: { 'Authorization': `Bearer ${token}` },
        });

        if (!res.ok) {
            const data = await res.json();
            showMsg(data.error || 'Download failed', 'error');
            return;
        }

        // Create a temporary link to trigger the browser's file download
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Share file ─────────────────────────────────────────────────────────
    async function shareFile(fileId, fileName) {
        const email = prompt(`Share "${fileName}" with (enter their email):`);
        if (!email) return;

        const { ok, data } = await apiFetch(`/api/files/${fileId}/share`, {
            method: 'POST',
            body: JSON.stringify({ email }),
        });

        if (ok) {
            showMsg(`"${fileName}" shared with ${email}`, 'success');
        } else {
            showMsg(data.error || 'Failed to share file', 'error');
        }
    }

    // ── Shared with me ─────────────────────────────────────────────────────
    async function loadSharedFiles() {
        const { ok, data } = await apiFetch('/api/shared');
        const sharedSection = document.getElementById('shared-section');
        const sharedList = document.getElementById('shared-list');

        if (!ok || data.length === 0) {
            sharedSection.hidden = true;
            return;
        }

        sharedSection.hidden = false;
        sharedList.innerHTML = '';

        data.forEach(file => {
            const row = document.createElement('div');
            row.className = 'dir-row';

            const icon = document.createElement('span');
            icon.className = 'dir-icon';
            icon.textContent = '[FILE]';

            const name = document.createElement('span');
            name.className = 'dir-name';
            name.textContent = file.name;

            const loc = document.createElement('span');
            loc.className = 'file-size';
            loc.textContent = file.directory_path;

            const size = document.createElement('span');
            size.className = 'file-size';
            size.textContent = formatSize(file.size);

            const dlBtn = document.createElement('button');
            dlBtn.className = 'download-btn';
            dlBtn.textContent = 'Download';
            dlBtn.addEventListener('click', () => downloadFile(file.id, file.name));

            row.appendChild(icon);
            row.appendChild(name);
            row.appendChild(loc);
            row.appendChild(size);
            row.appendChild(dlBtn);
            sharedList.appendChild(row);
        });
    }

    // ── Duplicate files view ───────────────────────────────────────────────
    async function loadDuplicates() {
        const { ok, data } = await apiFetch('/api/duplicates');
        const section = document.getElementById('duplicates-section');
        const list = document.getElementById('duplicates-list');

        if (!ok || data.length === 0) {
            section.hidden = true;
            return;
        }

        section.hidden = false;
        list.innerHTML = '';

        data.forEach(group => {
            const card = document.createElement('div');
            card.className = 'dup-group';

            const header = document.createElement('div');
            header.className = 'dup-group-header';
            header.textContent = `${group.length} identical files`;
            card.appendChild(header);

            group.forEach(file => {
                const row = document.createElement('div');
                row.className = 'dir-row';

                const icon = document.createElement('span');
                icon.className = 'dir-icon';
                icon.textContent = '[FILE]';

                const name = document.createElement('span');
                name.className = 'dir-name';
                name.textContent = file.name;

                const loc = document.createElement('span');
                loc.className = 'file-size';
                loc.textContent = file.directory_path;

                const size = document.createElement('span');
                size.className = 'file-size';
                size.textContent = formatSize(file.size);

                const dlBtn = document.createElement('button');
                dlBtn.className = 'download-btn';
                dlBtn.textContent = 'Download';
                dlBtn.addEventListener('click', () => downloadFile(file.id, file.name));

                row.appendChild(icon);
                row.appendChild(name);
                row.appendChild(loc);
                row.appendChild(size);
                row.appendChild(dlBtn);
                card.appendChild(row);
            });

            list.appendChild(card);
        });
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function formatSize(bytes) {
        if (!bytes) return '';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function showMsg(text, type) {
        msgEl.textContent = text;
        msgEl.className = `message ${type}`;
        msgEl.hidden = false;
        clearTimeout(msgEl._timer);
        msgEl._timer = setTimeout(() => { msgEl.hidden = true; }, 4000);
    }
    </script>
</body>
</html>
